version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: planify-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Lalit9968@}
      MYSQL_DATABASE: taskmanager_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: planify-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/taskmanager_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-Lalit9968@}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # On AWS, the React app runs in the user's browser, so it must connect to the public IP of the EC2 instance, not 'localhost' or 'backend'.
        # You will pass this when building: EC2_PUBLIC_IP=your-ip docker compose build
        - VITE_API_URL=http://${EC2_PUBLIC_IP:-localhost}:8080/api
    container_name: planify-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
